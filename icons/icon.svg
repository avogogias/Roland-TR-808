  <circle cx="100" cy="176" r="8"  fill="#ff8800"/>
  <line x1="100" y1="148" x2="100" y2="160" stroke="#ff8800" stroke-width="3" stroke-linecap="round"/>

  <circle cx="180" cy="176" r="28" fill="#1e1e1e" stroke="#ff8800" stroke-width="3"/>
  <circle cx="180" cy="176" r="8"  fill="#ff8800"/>
  <line x1="166" y1="154" x2="173" y2="162" stroke="#ff8800" stroke-width="3" stroke-linecap="round"/>

  <circle cx="260" cy="176" r="28" fill="#1e1e1e" stroke="#8855dd" stroke-width="3"/>
  <circle cx="260" cy="176" r="8"  fill="#8855dd"/>
  <line x1="260" y1="148" x2="260" y2="160" stroke="#8855dd" stroke-width="3" stroke-linecap="round"/>

