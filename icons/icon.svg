  <line x1="420" y1="148" x2="420" y2="160" stroke="#4488ff" stroke-width="3" stroke-linecap="round"/>

  <!-- VU / waveform display -->
  <rect x="56" y="228" width="400" height="48" rx="6" fill="#050505" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Waveform polyline: sawtooth + sine hint -->
  <polyline
    points="66,252 106,218 106,284 146,252 176,230 206,274 236,252 266,222 296,282 326,252 356,228 386,276 416,252 446,252"
    fill="none" stroke="#8855dd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Mini keyboard -->
  <!-- White keys -->
