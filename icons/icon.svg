  <rect x="124" y="300" width="26" height="60" rx="3" fill="#1a1030" stroke="#5533aa" stroke-width="1.5"/>
  <rect x="208" y="300" width="26" height="60" rx="3" fill="#1a1030" stroke="#5533aa" stroke-width="1.5"/>
  <rect x="250" y="300" width="26" height="60" rx="3" fill="#1a1030" stroke="#5533aa" stroke-width="1.5"/>
  <rect x="292" y="300" width="26" height="60" rx="3" fill="#1a1030" stroke="#5533aa" stroke-width="1.5"/>
