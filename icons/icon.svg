  <rect x="98"  y="300" width="36" height="96" rx="3" fill="#e8e0ff" stroke="#7755cc" stroke-width="1.5"/>
  <rect x="140" y="300" width="36" height="96" rx="3" fill="#e8e0ff" stroke="#7755cc" stroke-width="1.5"/>
